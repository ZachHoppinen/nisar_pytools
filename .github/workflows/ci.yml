name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm can derive the version.
          fetch-depth: 0

      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          # Cache the solved environment keyed on environment.yml hash;
          # subsequent runs skip the solve entirely. Saves ~3-5 minutes.
          cache-environment: true

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v -m "not integration"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*
