name: nisar_pytools
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - asf_search>=7.0
  - dask>=2024.0
  - h5py>=3.10
  - numpy>=1.24
  - rasterio>=1.3
  - pyproj>=3.4
  - requests
  - rioxarray>=0.15
  - shapely>=2.0
  - scipy>=1.10
  - snaphu>=0.3
  - xarray>=2024.10
  - zarr
  - h5netcdf
  - python-build  # PyPA build tool; conda-forge name (defaults called it 'build')
  - nbstripout
  - pre-commit
  - pytest
  - ruff
  - twine
  - jupyter
  - matplotlib
  # ISCE3 + nisar.workflows.insar runtime stack (used by
  # nisar_pytools.processing.rslc_to_gunw). isce3 and the GDAL HDF5 plugin
  # are conda-forge-only; the rest are also on PyPI via the [isce3] extras.
  # NB: 'snaphu' is already pinned above as a core dep.
  - isce3>=0.25
  - libgdal-hdf5
  - pygrib>=2.1
  - pyaps3>=0.2
  - raider>=0.5
  - pysolid>=0.3
  - netcdf4>=1.5
  - pyyaml>=6.0
  - dem_stitcher
  - pip
  - pip:
      - -e .
