# Default NISAR L2 InSAR runconfig used by nisar_pytools.processing.rslc_to_gunw
#
# Adapted from the JPL X05010 production runconfig (see
# local/gunws/NISAR_L2_PR_GUNW_..._001.rc.yaml). All path fields are left as
# null and will be filled in at runtime by ``rslc_to_gunw``. Processing
# parameters mirror JPL production: 5x6 crossmul, 13x16 unwrap, full
# coregistration (dense_offsets + rubbersheet + fine_resample), split-spectrum
# ionosphere correction enabled.
#
# Default differences from JPL production:
#   - troposphere_delay disabled (no ECMWF locally)
#   - tec_file null (split-spectrum ionosphere does not need it)
#   - water_mask_file null
#   - orbit_files null (use orbit embedded in the RSLC)
#
# Override any of these via the ``overrides`` argument to rslc_to_gunw().
runconfig:
    name: NISAR_INSAR_RUNCONFIG
    groups:
        pge_name_group:
            pge_name: INSAR_L_PGE
        input_file_group:
            reference_rslc_file:
            secondary_rslc_file:
            qa_gunw_input_file:
        dynamic_ancillary_file_group:
            dem_file:
            water_mask_file:
            orbit_files:
                reference_orbit_file:
                secondary_orbit_file:
            troposphere_weather_model_files:
                reference_troposphere_file:
                secondary_troposphere_file:
            tec_file:
        primary_executable:
            product_type: GUNW
            product_version:
                rifg_version: 1.0.2
                roff_version: 1.0.2
                runw_version: 1.0.2
                goff_version: 1.0.2
                gunw_version: 1.0.2
            composite_release_id: X05010
            processing_type: PR
            product_accuracy: N
            processing_center: J
            partial_granule_id: NISAR_{Level}_PR_{ProductType}_{Track}_{Frame}_{Mode}_{Pol}_{RefStartDateTime}_{RefEndDateTime}_{SecStartDateTime}_{SecEndDateTime}_X05010_N_F_J_001
        product_path_group:
            product_path:
            scratch_path:
            sas_output_file:
            product_counter: 1
            qa_output_dir:
        debug_level_group:
            debug_switch: false
        processing:
            input_subset:
                list_of_frequencies:
                    A: [HH]
            dem_download:
                source:
                top_left:
                    x:
                    y:
                bottom_right:
                    x:
                    y:
            geocode:
                output_epsg:
                top_left:
                    y_abs:
                    x_abs:
                bottom_right:
                    y_abs:
                    x_abs:
                output_posting:
                    A:
                        x_posting: 80
                        y_posting: 80
                wrapped_interferogram:
                    interp_method: SINC
                    output_posting:
                        A:
                            x_posting: 20
                            y_posting: 20
            radar_grid_cubes:
                output_epsg:
                output_posting:
                    x_posting:
                    y_posting:
                top_left:
                    y_abs:
                    x_abs:
                bottom_right:
                    y_abs:
                    x_abs:
            ionosphere_phase_correction:
                spectral_diversity: main_diff_ms_band
                enabled: true
                dispersive_filter:
                    filter_mask_type:
                    - coherence
                    - subswath_mask
                    filter_coherence_threshold: 0.2
                    kernel_range: 39
                    kernel_azimuth: 39
                    sigma_range: 13
                    sigma_azimuth: 13
            troposphere_delay:
                enabled: false
            dense_offsets:
                enabled: true
                window_range: 64
                window_azimuth: 96
                half_search_range: 16
                half_search_azimuth: 16
                skip_range: 75
                skip_azimuth: 75
                correlation_surface_oversampling_factor: 16
                deramping_method: magnitude
            offsets_product:
                enabled: false
            rubbersheet:
                enabled: true
                polyfitting:
                    enabled: true
                    degree: 2
                    critical_value: 0.1
                    samples_along_range: 200
                    samples_along_azimuth: 200
            fine_resample:
                enabled: true
            crossmul:
                range_looks: 5
                azimuth_looks: 6
            phase_unwrap:
                range_looks: 13
                azimuth_looks: 16
                preprocess_wrapped_phase:
                    enabled: true
                    mask:
                        mask_type: subswath_mask
                bridge:
                    enabled: false
        worker:
            internet_access: false
            gpu_enabled: false
            intermediate_files_removal_enabled: true
        qa:
            gunw:
                workflows:
                    validate: false
                    qa_reports: false
        logging:
            path:
            write_mode: a
