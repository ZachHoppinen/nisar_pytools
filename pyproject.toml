[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nisar_pytools"
version = "0.1.0"
description = "Open source Python tools for working with NISAR datasets"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "h5py",
    "numpy",
    "rasterio",
    "rioxarray",
    "xarray",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]
notebooks = [
    "jupyter",
    "matplotlib",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
